<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thinking — Logo Animado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="stage" id="stage">
  <canvas id="field"></canvas>
  <div class="rings">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
  </div>

  <div class="logo-wrap" id="logoWrap">
    <div class="logo-orbit" id="logoOrbit">
      <img class="logo-img" id="logoImg" src="logo.png" alt="Logo" draggable="false">
      <div class="spark"></div>
      <div class="hemis" id="hemis"><div class="side left"></div><div class="side right"></div></div>
    </div>
  </div>

  <div class="caption">
    <div class="word">mueve el cursor <span>·</span> clic para un pensamiento</div>
  </div>

  <div class="vignette"></div>
  <div class="grain"></div>
</div>

<script src="script.js"></script>
</body>
</html>
